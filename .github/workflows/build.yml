name: Build Standalone APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 1. 彻底补齐并纠正 Gradle Wrapper
    - name: Rebuild Complete Gradle Wrapper
      run: |
        echo "=== Creating gradle/wrapper folder structure ==="
        mkdir -p gradle/wrapper
        rm -f gradlew
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew -o gradlew
        chmod +x gradlew
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        
        cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
        networkTimeout=10000
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

    # 2. 精准修复仓库配置，杜绝语法冲突
    - name: Configure Gradle Repositories
      run: |
        echo "=== Configuring settings.gradle with Plugin Management ==="
        if [ -f settings.gradle ]; then
          printf "pluginManagement {\n    repositories {\n        google()\n        mavenCentral()\n        gradlePluginPortal()\n    }\n    plugins {\n        id 'com.android.application' version '8.0.0'\n    }\n}\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\nrootProject.name = 'android_apk_tcp_sftp_tools'\ninclude ':app'\n" > settings.gradle
        fi

        if [ -f app/build.gradle.bak ]; then
          mv app/build.gradle.bak app/build.gradle
        fi

    # 3. 强行启用 AndroidX 编译开关
    - name: Configure Gradle Properties
      run: |
        echo "=== Patching gradle.properties ==="
        touch gradle.properties
        cat << 'EOF' >> gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        android.suppressUnsupportedCompileSdk=34
        EOF

    # 4. 核心步骤：自动补齐缺少的 mipmap 图标资源
    - name: Fix Missing Mipmap Icons
      run: |
        echo "=== Checking and creating placeholder icons ==="
        # 定义 mipmap-anydpi-v26 目录（现代 Android 的 XML 矢量自适应图标存放地）
        MIPMAP_DIR="app/src/main/res/mipmap-anydpi-v26"
        mkdir -p "$MIPMAP_DIR"

        # 定义一个最简的 Android 矢量图标 XML 内容（一个绿色的圆形）
        cat << 'EOF' > "$MIPMAP_DIR/ic_launcher.xml"
        <?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@android:color/holo_green_dark" />
            <foreground android:drawable="@android:color/white" />
        </adaptive-icon>
        EOF

        # 同样为圆角图标生成对应的占位资源
        cat << 'EOF' > "$MIPMAP_DIR/ic_launcher_round.xml"
        <?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@android:color/holo_green_dark" />
            <foreground android:drawable="@android:color/white" />
        </adaptive-icon>
        EOF
        echo "Placeholder icons generated successfully."

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"
