name: Build Standalone APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 1. 彻底补齐并纠正 Gradle Wrapper
    - name: Rebuild Complete Gradle Wrapper
      run: |
        echo "=== Creating gradle/wrapper folder structure ==="
        mkdir -p gradle/wrapper
        
        # 强制删除本地损坏的文件
        rm -f gradlew
        
        # 下载干净的官方 Linux 启动脚本 gradlew
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew -o gradlew
        chmod +x gradlew
        
        # 下载配套的 gradle-wrapper.jar
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        
        # 强制写入标准的 gradle-wrapper.properties 配置文件
        cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
        networkTimeout=10000
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

    # 2. 强行在 app/build.gradle 中注入插件版本号，并注入仓库
    - name: Patch AGP Version and Repositories
      run: |
        echo "=== Patching app/build.gradle ==="
        # 强制把 id 'com.android.application' 替换为带版本号的形式，防止 Gradle 找不到版本
        if [ -f app/build.gradle ]; then
          sed -i "s/id 'com.android.application'/id 'com.android.application' version '8.0.0'/g" app/build.gradle
          sed -i 's/id "com.android.application"/id "com.android.application" version "8.0.0"/g' app/build.gradle
          echo "Patched app/build.gradle successfully."
        fi

        echo "=== Injecting Repositories into settings.gradle ==="
        if [ -f settings.gradle ]; then
          cp settings.gradle settings.gradle.bak
          
          # 强制在 settings.gradle 最前排塞入 pluginManagement 块确保能拉到插件包
          printf "pluginManagement {\n    repositories {\n        google()\n        mavenCentral()\n        gradlePluginPortal()\n    }\n}\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.PRESERVE_ACTIVE_REPOS)\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\n" > temp_settings.gradle
          
          cat settings.gradle.bak >> temp_settings.gradle
          mv temp_settings.gradle settings.gradle
          echo "Injected settings.gradle successfully."
        fi

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"
