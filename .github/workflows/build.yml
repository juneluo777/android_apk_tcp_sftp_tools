name: Build Standalone APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 1. 彻底补齐并纠正 Gradle Wrapper
    - name: Rebuild Complete Gradle Wrapper
      run: |
        echo "=== Creating gradle/wrapper folder structure ==="
        mkdir -p gradle/wrapper
        
        # 强制删除本地损坏的文件
        rm -f gradlew
        
        # 下载干净的官方 Linux 启动脚本 gradlew
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew -o gradlew
        chmod +x gradlew
        
        # 下载配套的 gradle-wrapper.jar
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        
        # 强制写入标准的 gradle-wrapper.properties 配置文件
        cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
        networkTimeout=10000
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

    # 2. 精准修复仓库配置，杜绝语法冲突
    - name: Configure Gradle Repositories
      run: |
        echo "=== Configuring settings.gradle with Plugin Management ==="
        if [ -f settings.gradle ]; then
          # 强制重写 settings.gradle，使用最标准的 Google 仓库声明和插件版本下发
          printf "pluginManagement {\n    repositories {\n        google()\n        mavenCentral()\n        gradlePluginPortal()\n    }\n    plugins {\n        id 'com.android.application' version '8.0.0'\n    }\n}\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\nrootProject.name = 'android_apk_tcp_sftp_tools'\ninclude ':app'\n" > settings.gradle
          echo "Overwrote settings.gradle successfully."
        fi

        echo "=== Ensuring app/build.gradle is clean ==="
        if [ -f app/build.gradle.bak ]; then
          mv app/build.gradle.bak app/build.gradle
          echo "Restored original app/build.gradle to clear injected code."
        fi

    # 3. 强行启用 AndroidX 编译开关，并忽略 compileSdk 34 的 AGP 8.0 警告
    - name: Configure Gradle Properties
      run: |
        echo "=== Patching gradle.properties ==="
        # 如果文件不存在，则直接创建
        touch gradle.properties
        
        # 写入 AndroidX 核心开关和不匹配 SDK 的警告屏蔽开关
        cat << 'EOF' >> gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        android.suppressUnsupportedCompileSdk=34
        EOF
        echo "Configured gradle.properties successfully."

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"
