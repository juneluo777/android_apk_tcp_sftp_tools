name: Build Standalone APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 1. 彻底补齐并纠正 Gradle Wrapper
    - name: Rebuild Complete Gradle Wrapper
      run: |
        echo "=== Creating gradle/wrapper folder structure ==="
        mkdir -p gradle/wrapper
        
        # 强制删除本地损坏的文件
        rm -f gradlew
        
        # 下载干净的官方 Linux 启动脚本 gradlew
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew -o gradlew
        chmod +x gradlew
        
        # 下载配套的 gradle-wrapper.jar
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        
        # 强制写入标准的 gradle-wrapper.properties 配置文件
        cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
        networkTimeout=10000
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

    # 2. 强行在 app/build.gradle 中注入插件版本号，并注入正确的仓库配置
    - name: Patch AGP Version and Repositories
      run: |
        echo "=== Patching app/build.gradle ==="
        if [ -f app/build.gradle ]; then
          # 备份原文件
          cp app/build.gradle app/build.gradle.bak
          
          # 1. 强制把 id 'com.android.application' 替换为带版本号的形式
          sed -i "s/id 'com.android.application'/id 'com.android.application' version '8.0.0'/g" app/build.gradle
          sed -i 's/id "com.android.application"/id "com.android.application" version "8.0.0"/g' app/build.gradle
          
          # 2. 在 app/build.gradle 最顶端强行注入 buildscript，确保单独编译该模块时能拉到核心插件和库
          printf "buildscript {\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\nallprojects {\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\n\n" > temp_app_build.gradle
          cat app/build.gradle >> temp_app_build.gradle
          mv temp_app_build.gradle app/build.gradle
          echo "Patched app/build.gradle successfully."
        fi

        echo "=== Cleaning and Overriding settings.gradle ==="
        if [ -f settings.gradle ]; then
          # 直接强制重写一个极简的 settings.gradle，将模式设为 PREFER_PROJECT。
          # 这样 Gradle 就会完全听从刚才我们在 app/build.gradle 顶部注入的仓库设置，再也不会报错！
          printf "pluginManagement {\n    repositories {\n        google()\n        mavenCentral()\n        gradlePluginPortal()\n    }\n}\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\nrootProject.name = 'android_apk_tcp_sftp_tools'\ninclude ':app'\n" > settings.gradle
          echo "Reset settings.gradle successfully."
        fi

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"
