name: Build Standalone APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 核心修复：同时下载干净的 gradlew 脚本和配套的 gradle-wrapper.jar 包
    - name: Download Clean gradlew and jar wrapper
      run: |
        echo "=== Re-creating Gradle Wrapper folder structure ==="
        # 确保 gradle/wrapper 目录存在
        mkdir -p gradle/wrapper
        
        # 强制删除本地可能损坏或格式不对的启动脚本
        rm -f gradlew
        
        # 1. 下载官方原装 Linux gradlew 脚本
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew -o gradlew
        chmod +x gradlew
        
        # 2. 下载配套必不可少的 gradle-wrapper.jar 包
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"
