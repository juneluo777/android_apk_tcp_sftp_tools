name: Build Standalone APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 1. 彻底补齐并纠正 Gradle Wrapper
    - name: Rebuild Complete Gradle Wrapper
      run: |
        echo "=== Creating gradle/wrapper folder structure ==="
        mkdir -p gradle/wrapper
        
        # 强制删除本地损坏的文件
        rm -f gradlew
        
        # 下载干净的官方 Linux 启动脚本 gradlew
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew -o gradlew
        chmod +x gradlew
        
        # 下载配套的 gradle-wrapper.jar
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        
        # 强制写入标准的 gradle-wrapper.properties 配置文件
        cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
        networkTimeout=10000
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

    # 2. 注入全局仓库到根目录的 build.gradle
    - name: Inject Google Repositories to build.gradle
      run: |
        echo "=== Injecting buildscript and repositories into root build.gradle ==="
        if [ -f build.gradle ]; then
          # 备份原有的 build.gradle
          cp build.gradle build.gradle.bak
          
          # 用 printf 在最顶部注入 buildscript、repositories 以及 allprojects 块，确保所有模块强制使用 Google 仓库
          printf "buildscript {\n    repositories {\n        google()\n        mavenCentral()\n    }\n    dependencies {\n        classpath 'com.android.tools.build:gradle:8.0.0'\n    }\n}\n\nallprojects {\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\n\n" > temp_build.gradle
          
          # 合并原有内容
          cat build.gradle.bak >> temp_build.gradle
          mv temp_build.gradle build.gradle
          echo "Injected build.gradle successfully."
        else
          echo "Root build.gradle not found!"
        fi

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"
