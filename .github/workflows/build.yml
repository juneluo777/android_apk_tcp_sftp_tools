name: Build Standalone APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 核心修复：不重新生成，而是用 dos2unix 强行修复本地原本的 gradlew 换行符与格式问题！
    - name: Repair and Grant permission for gradlew
      run: |
        echo "=== Repairing gradlew ==="
        # 如果文件里有 Windows 换行符（CRLF），强行转换为 Linux 换行符（LF）
        sed -i 's/\r$//' gradlew
        # 赋予执行权限
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"
