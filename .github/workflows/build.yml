name: Build Standalone APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 核心修复：直接从官方源下载最新且绝对干净、合法的 Linux gradlew 脚本覆盖掉坏文件！
    - name: Download Clean official gradlew
      run: |
        echo "=== Downloading official clean gradlew ==="
        # 强制删除本地损坏的文件
        rm -f gradlew
        # 从 Gradle 官方合规的 wrapper 源码库直接下载原装 gradlew
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew -o gradlew
        # 赋予可执行权限
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"
