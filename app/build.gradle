plugins {
    id 'com.android.application'
}

android {
    namespace 'com.nettool.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.nettool.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    // 引入 SFTP 支持库
    implementation 'com.jcraft:jsch:0.1.55'
}
